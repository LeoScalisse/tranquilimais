<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    
    <!-- Primary Meta Tags -->
    <title>Tranquili+</title>
    <meta name="title" content="Tranquili+" />
    <meta name="description" content="App da Tranquili+ para uso diário para viver uma vida +leve +feliz e +calma" />
    <meta name="author" content="Tranquili+" />
    
    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#4ABEDF" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="Tranquili+" />
    
    <!-- iOS Meta Tags -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Tranquili+" />
    <link rel="apple-touch-icon" href="/pwa-icons/apple-touch-icon.png" />
    
    <!-- Splash Screens for iOS -->
    <link rel="apple-touch-startup-image" href="/pwa-icons/icon-512x512.png" />
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="512x512" href="/pwa-icons/icon-512x512.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/pwa-icons/icon-192x192.png" />
    <link rel="icon" type="image/png" sizes="144x144" href="/pwa-icons/icon-144x144.png" />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Tranquili+" />
    <meta property="og:description" content="App da Tranquili+ para uso diário para viver uma vida +leve +feliz e +calma" />
    <meta property="og:image" content="/pwa-icons/icon-512x512.png" />
    
    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Tranquili+" />
    <meta name="twitter:description" content="App da Tranquili+ para uso diário para viver uma vida +leve +feliz e +calma" />
    <meta name="twitter:image" content="/pwa-icons/icon-512x512.png" />
    
    <!-- Prevent phone number detection -->
    <meta name="format-detection" content="telephone=no" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
